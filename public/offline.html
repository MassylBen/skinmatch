<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkinMatch — Hors ligne</title>
<style>
  :root { --brand: #C4726A; --bg: #FDF8F5; --pri: #3D2B1F; --mut: #B0958F; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Outfit', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 28px;
    text-align: center;
    color: var(--pri);
  }
  .logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #C4726A, #A85A52);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-size: 28px; font-weight: 700; color: #fff;
    box-shadow: 0 8px 30px rgba(196,114,106,.35);
    margin-bottom: 32px;
  }
  h1 { font-family: Georgia, serif; font-size: 28px; margin-bottom: 12px; }
  p  { font-size: 15px; color: var(--mut); line-height: 1.7; margin-bottom: 32px; max-width: 300px; }
  .btn {
    padding: 14px 32px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, #C4726A, #A85A52);
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; box-shadow: 0 4px 15px rgba(196,114,106,.4);
    text-decoration: none; display: inline-block;
  }
  .tip {
    margin-top: 28px; font-size: 12px; color: #C8B4AE; line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="logo">SM</div>
  <h1>Vous êtes hors ligne</h1>
  <p>Votre dernière routine est disponible. Reconnectez-vous pour accéder à toutes les fonctionnalités.</p>
  <a class="btn" href="/" onclick="location.reload()">Réessayer</a>
  <p class="tip">SkinMatch fonctionne partiellement sans connexion.<br>Votre routine sauvegardée reste accessible.</p>
</body>
</html>
